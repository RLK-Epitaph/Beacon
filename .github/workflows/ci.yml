name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build

  backend:
    name: Backend syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Syntax-check all source files
        run: find src -name "*.js" -print0 | xargs -0 -n1 node --check
      - name: Server boots
        # Start with dev-safe defaults and confirm /health responds, then stop.
        run: |
          SESSION_SECRET=ci TOKEN_ENC_KEY="" node src/server.js &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:4000/health
          kill $SERVER_PID
